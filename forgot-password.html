<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');

    :root {
      --bg-dark: #050505;
      --bg-light: #1c1c1c;
      --surface: rgba(255, 255, 255, 0.02);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --text2: #8b8b8b;
      --accent: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 50px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      text-align: center;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin: 0 auto 20px;
      letter-spacing: 2px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 12px;
    }
    p {
      color: var(--text2);
      font-size: 14px;
      font-weight: 300;
      margin-bottom: 30px;
    }
    .role-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .role-card {
      background: rgba(255,255,255,0.01);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s;
      text-align: left;
    }
    .role-card:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .role-card.active {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.1);
    }
    .role-icon {
      width: 40px;
      height: 40px;
      border-radius: 0;
      background: rgba(255,255,255,0.05);
      display: grid;
      place-items: center;
      font-size: 18px;
      color: var(--accent);
    }
    .role-info b { display: block; font-size: 13px; font-weight: 500; letter-spacing: 1px; color: var(--text); text-transform: uppercase; }
    .role-info span { font-size: 11px; color: var(--text2); font-weight: 300; }
    
    .form-group {
      text-align: left;
      margin-bottom: 16px;
      position: relative;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--text2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 14px 14px 40px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-group i {
      position: absolute;
      left: 14px;
      top: 36px;
      color: var(--text2);
      font-size: 14px;
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: 0;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .login-btn:hover {
      background: var(--accent);
      color: #000;
    }
    .links {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text2);
      font-weight: 300;
    }
    .links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      margin-left: 5px;
      transition: opacity 0.3s;
    }
    .links a:hover {
      opacity: 0.7;
    }
    #errorMsg, #successMsg {
      display: none;
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 0;
      font-size: 13px;
    }
    #errorMsg { background: rgba(220, 38, 38, 0.1); border: 1px solid #dc2626; color: #fca5a5; }
    #successMsg { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; color: #6ee7b7; }
    
    /* Removed custom logo icon to use text logo */
  </style>
</head>
<body>
  <script>
    if (localStorage.getItem("ecoTrack_theme") !== "dark") document.body.classList.add("light-mode");
  </script>
  <div class="bg-glow"></div>
  <div class="login-container">
    <div class="logo">ECOTRACK</div>
    <h1>Reset Password</h1>
    <p>Enter your email address and we'll send you a link to reset your password.</p>

    <div class="error-msg" id="errorMsg">Error sending reset link.</div>
    <div class="success-msg" id="successMsg">
      <i class="fas fa-check-circle"></i> Check your email for the reset link!
    </div>

    <form id="resetForm" onsubmit="handleResetRequest(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="name@example.com">
      </div>
      <button type="submit" class="login-btn" id="resetBtn">Send Reset Link</button>
    </form>

    <div class="auth-links">
      Remembered your password? <a href="login.html">Back to Login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    async function handleResetRequest(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const btn = document.getElementById('resetBtn');
      const err = document.getElementById('errorMsg');
      const suc = document.getElementById('successMsg');

      btn.innerText = 'Sending...';
      btn.disabled = true;
      err.style.display = 'none';
      suc.style.display = 'none';

      try {
        if (!window.supabase) throw new Error("Supabase is not configured.");

        const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
          // This tells Supabase where to redirect the user after they click the link in their email
          redirectTo: 'https://eco-track-smartbin-system.onrender.com/update-password.html',
        });

        if (error) throw error;

        // Success!
        suc.style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';

      } catch (error) {
        err.innerText = error.message;
        err.style.display = 'block';
        btn.innerText = 'Send Reset Link';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
