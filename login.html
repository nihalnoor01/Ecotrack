<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');

    :root {
      --bg-dark: #050505;
      --bg-light: #1c1c1c;
      --surface: rgba(255, 255, 255, 0.02);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --text2: #8b8b8b;
      --accent: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 50px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      text-align: center;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin: 0 auto 20px;
      letter-spacing: 2px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 12px;
    }
    p {
      color: var(--text2);
      font-size: 14px;
      font-weight: 300;
      margin-bottom: 30px;
    }
    .role-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .role-card {
      background: rgba(255,255,255,0.01);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s;
      text-align: left;
    }
    .role-card:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .role-card.active {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.1);
    }
    .role-icon {
      width: 40px;
      height: 40px;
      border-radius: 0;
      background: rgba(255,255,255,0.05);
      display: grid;
      place-items: center;
      font-size: 18px;
      color: var(--accent);
    }
    .role-info b { display: block; font-size: 13px; font-weight: 500; letter-spacing: 1px; color: var(--text); text-transform: uppercase; }
    .role-info span { font-size: 11px; color: var(--text2); font-weight: 300; }
    
    .form-group {
      text-align: left;
      margin-bottom: 16px;
      position: relative;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--text2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 14px 14px 40px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-group i {
      position: absolute;
      left: 14px;
      top: 36px;
      color: var(--text2);
      font-size: 14px;
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: 0;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .login-btn:hover {
      background: var(--accent);
      color: #000;
    }
    .auth-links {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text2);
      font-weight: 300;
    }
    .auth-links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      margin-left: 5px;
      transition: opacity 0.3s;
    }
    .auth-links a:hover {
      opacity: 0.7;
    }
    #errorMsg, #successMsg {
      display: none;
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 0;
      font-size: 13px;
    }
    #errorMsg { background: rgba(220, 38, 38, 0.1); border: 1px solid #dc2626; color: #fca5a5; }
    #successMsg { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; color: #6ee7b7; }
    
    .tabs {
      display: flex;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 0;
      margin-bottom: 25px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      border-radius: 0;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .tab.active {
      background: var(--text);
      color: #000;
    }
  </style>
</head>
<body>
  <script>
    if (localStorage.getItem("ecoTrack_theme") !== "dark") document.body.classList.add("light-mode");
  </script>
  <div class="bg-glow"></div>
  <div class="login-container">
    <div class="logo">ECOTRACK</div>
    <h1>Welcome Back</h1>
    <p>Sign in to your EcoTrack account</p>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('citizen')" id="tab-citizen">Resident</div>
      <div class="tab" onclick="switchTab('collector')" id="tab-collector">Collector</div>
    </div>

    <div class="error-msg" id="errorMsg">Invalid credentials.</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="name@example.com">
      </div>
      <div class="form-group" style="position: relative;">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••" style="padding-right: 40px;">
        <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 14px; top: 38px; cursor: pointer; color: var(--text2); font-size: 14px;"></i>
        <div style="text-align: right; margin-top: 6px;">
          <a href="forgot-password.html" style="color: var(--accent); font-size: 12px; text-decoration: none;">Forgot Password?</a>
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Login</button>
    </form>

    <script>
      document.querySelector('#togglePassword').addEventListener('click', function (e) {
        const password = document.querySelector('#password');
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
      });
    </script>

    <div class="auth-links">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    let currentRole = 'citizen';

    function switchTab(role) {
      currentRole = role;
      document.getElementById('tab-citizen').classList.toggle('active', role === 'citizen');
      document.getElementById('tab-collector').classList.toggle('active', role === 'collector');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      btn.innerText = 'Logging in...';
      btn.disabled = true;
      err.style.display = 'none';

      try {
        if (!window.supabase) {
           // Temporary fallback for UI testing before Supabase is configured
           setTimeout(() => {
             localStorage.setItem('ecoTrack_role', currentRole);
             localStorage.setItem('ecoTrack_user', email);
             window.location.href = 'dashboard.html';
           }, 1000);
           return;
        }

        const { data, error } = await supabase.auth.signInWithPassword({
          email, password
        });

        if (error) throw error;

        // Fetch user role from our custom users table
        const { data: userData, error: userError } = await supabase
          .from('users')
          .select('role')
          .eq('id', data.user.id)
          .single();

        if (userError) throw userError;

        if (userData.role !== currentRole) {
           throw new Error(`Account is not registered as a ${currentRole}.`);
        }

        localStorage.setItem('ecoTrack_role', userData.role);
        localStorage.setItem('ecoTrack_user', email);
        console.log("Session initialized for:", email);
        window.location.href = 'dashboard.html';

      } catch (error) {
        err.innerText = error.message;
        err.style.display = 'block';
        btn.innerText = 'Login';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
